name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      # Run govulncheck locally with a current Go toolchain when available; stdlib advisories track the Go version in use.
